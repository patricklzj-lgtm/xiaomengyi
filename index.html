<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>☆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    .star {
      position: fixed;
      font-size: 1.6rem;
      color: #ddd;
      user-select: none;
      cursor: default;
    }

    .star.blue {
      color: #5b9bd5;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .star.blue:hover {
      color: #3a7abf;
    }
  </style>
</head>
<body>

  <span class="star" id="s0">☆</span>
  <span class="star" id="s1">☆</span>
  <a class="star blue" id="s2" href="https://www.xiaohongshu.com/user/profile/5a707d824eacab756f6c2b60?xsec_token=ABTFMoUYKk2Q5Qf4rPhY6eIDef70tkRpvqAHMqnwUThpQ=&xsec_source=pc_note" target="_blank">★</a>
  <span class="star" id="s3">☆</span>
  <span class="star" id="s4">☆</span>
  <span class="star" id="s5">☆</span>

  <script>
    const stars = [];

    for (let i = 0; i < 6; i++) {
      stars.push({
        el: document.getElementById('s' + i),
        x: Math.random() * (window.innerWidth - 40),
        y: Math.random() * (window.innerHeight - 40),
        tx: Math.random() * (window.innerWidth - 40),
        ty: Math.random() * (window.innerHeight - 40),
        speed: 0.002 + Math.random() * 0.002
      });
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animate() {
      stars.forEach(s => {
        s.x = lerp(s.x, s.tx, s.speed);
        s.y = lerp(s.y, s.ty, s.speed);
        s.el.style.left = s.x + 'px';
        s.el.style.top = s.y + 'px';

        if (Math.abs(s.x - s.tx) < 1 && Math.abs(s.y - s.ty) < 1) {
          s.tx = Math.random() * (window.innerWidth - 40);
          s.ty = Math.random() * (window.innerHeight - 40);
        }
      });
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      stars.forEach(s => {
        s.tx = Math.min(s.tx, window.innerWidth - 40);
        s.ty = Math.min(s.ty, window.innerHeight - 40);
      });
    });
  </script>

</body>
</html>
